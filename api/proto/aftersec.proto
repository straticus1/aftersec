syntax = "proto3";

package aftersec.api;

option go_package = "aftersec/pkg/api/grpc;grpcapi";

service EnterpriseService {
  rpc Enroll (EnrollRequest) returns (EnrollResponse);
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
  rpc StreamEvents (stream ClientEvent) returns (StreamAck);
  rpc ConnectCommandStream (stream CommandResult) returns (stream ServerCommand);
}

service MalwareScanService {
  rpc ScanFile (ScanRequest) returns (ScanResponse);
  rpc ScanHistory (HistoryRequest) returns (HistoryResponse);
  rpc SearchHistory (SearchRequest) returns (SearchResponse);
}

message EnrollRequest {
  string hardware_id = 1;
  string hostname = 2;
  string os_version = 3;
  string agent_version = 4;
}

message EnrollResponse {
  string tenant_id = 1;
  string access_token = 2;
  bool success = 3;
  string message = 4;
}

message HeartbeatRequest {
  string tenant_id = 1;
  string hardware_id = 2;
  string status = 3;
  int64 timestamp = 4;
}

message HeartbeatResponse {
  bool policy_updated = 1;
  string new_policy_hash = 2;
  string action = 3; // "NONE", "RESTART", "UPDATE", "QUARANTINE", "LOCK_SCREEN", "WIPE_DATA", "ISOLATE_NETWORK", "FREEZE_PROCESS"
}

message ClientEvent {
  string tenant_id = 1;
  string hardware_id = 2;
  int64 timestamp = 3;
  string event_type = 4; // "SYSCALL", "FILE_MOD", "NETWORK_CONN", "PROCESS_EXEC", "PROCESS_EXIT", "INTENT_GRAPH_BLOCK", "AI_TRIAGE"
  string process_name = 5;
  int32 process_id = 6;
  string payload = 7; // JSON encoded details
  int32 parent_process_id = 8;
  int32 threat_score = 9;
  string ai_verdict = 10;
}

message StreamAck {
  int32 events_processed = 1;
  string message = 2;
}

message CommandResult {
  string tenant_id = 1;
  string hardware_id = 2;
  string command_id = 3;
  string status = 4; // "ACK", "SUCCESS", "FAILED"
  string output = 5;
}

message ServerCommand {
  string command_id = 1;
  string action = 2; // "EXEC", "REMEDIATE", "LOCK_SCREEN", "WIPE_DATA", "QUARANTINE", "ISOLATE_NETWORK", "FREEZE_PROCESS", "CREATE_SNAPSHOT"
  string payload = 3;
}

// DarkScan Malware Scanning Messages

message ScanRequest {
  string file_path = 1;
  bool recursive = 2;
  repeated string enabled_engines = 3;
}

message ScanResponse {
  string file_path = 1;
  bool infected = 2;
  string threat_level = 3;
  repeated Threat threats = 4;
  repeated string engines_used = 5;
  string scan_duration = 6;
  string error = 7;
}

message Threat {
  string name = 1;
  string severity = 2;
  string description = 3;
  string engine = 4;
}

message HistoryRequest {
  int32 limit = 1;
}

message HistoryResponse {
  int32 total_scans = 1;
  string time_range = 2;
  repeated HistoryEntry scans = 3;
}

message HistoryEntry {
  string timestamp = 1;
  string file_path = 2;
  bool infected = 3;
  int32 threat_count = 4;
  repeated string threat_names = 5;
  repeated string engines_used = 6;
  string scan_duration = 7;
}

message SearchRequest {
  string query = 1;
  int32 limit = 2;
}

message SearchResponse {
  string query = 1;
  int32 total_results = 2;
  repeated SearchResult results = 3;
}

message SearchResult {
  string timestamp = 1;
  string file_path = 2;
  string file_hash = 3;
  bool infected = 4;
  repeated Threat threats = 5;
  repeated string engines_used = 6;
}
